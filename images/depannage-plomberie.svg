<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#fff3cd"/>
  
  <!-- Emergency van -->
  <rect x="80" y="120" width="120" height="80" fill="#e74c3c" rx="5"/>
  <rect x="180" y="140" width="40" height="60" fill="#c0392b" rx="3"/>
  <circle cx="110" cy="210" r="15" fill="#2c3e50"/>
  <circle cx="190" cy="210" r="15" fill="#2c3e50"/>
  <circle cx="110" cy="210" r="8" fill="#34495e"/>
  <circle cx="190" cy="210" r="8" fill="#34495e"/>
  
  <!-- NG Plomberie logo on van -->
  <rect x="95" y="135" width="70" height="25" fill="#2d5016" rx="3"/>
  <text x="130" y="152" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">NG PL</text>
  
  <!-- Emergency light -->
  <circle cx="200" cy="130" r="8" fill="#f1c40f" opacity="0.8"/>
  <path d="M 195 125 L 200 115 L 205 125" stroke="#f39c12" stroke-width="2" fill="none"/>
  
  <!-- Broken pipe with water leak -->
  <rect x="250" y="140" width="60" height="8" fill="#7f8c8d"/>
  <rect x="295" y="138" width="8" height="12" fill="#95a5a6"/>
  
  <!-- Water drops -->
  <ellipse cx="305" cy="135" rx="3" ry="5" fill="#3498db"/>
  <ellipse cx="310" cy="130" rx="2" ry="4" fill="#2980b9"/>
  <ellipse cx="308" cy="125" rx="2" ry="3" fill="#3498db"/>
  
  <!-- Emergency tools -->
  <rect x="320" y="160" width="30" height="4" fill="#34495e" transform="rotate(30 335 162)"/>
  <rect x="330" y="175" width="25" height="3" fill="#e67e22" transform="rotate(-45 342 176)"/>
  
  <!-- Clock showing urgency -->
  <circle cx="350" cy="80" r="20" fill="#2c3e50"/>
  <circle cx="350" cy="80" r="18" fill="#ecf0f1"/>
  <line x1="350" y1="80" x2="350" y2="70" stroke="#e74c3c" stroke-width="2"/>
  <line x1="350" y1="80" x2="358" y2="85" stroke="#e74c3c" stroke-width="2"/>
  <text x="350" y="105" text-anchor="middle" fill="#e74c3c" font-family="Arial" font-size="8" font-weight="bold">24/7</text>
  
  <!-- Emergency text -->
  <rect x="60" y="50" width="100" height="25" fill="#dc3545" rx="5"/>
  <text x="110" y="67" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">URGENCE</text>
  
  <!-- Professional badge -->
  <rect x="240" y="240" width="120" height="20" fill="#17a2b8" rx="10"/>
  <text x="300" y="253" text-anchor="middle" fill="white" font-family="Arial" font-size="9">INTERVENTION RAPIDE</text>
</svg>