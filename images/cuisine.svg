<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- Kitchen scene -->
  <rect x="40" y="80" width="320" height="180" rx="10" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
  
  <!-- Kitchen counter -->
  <rect x="50" y="200" width="300" height="40" rx="5" fill="#8d6e63"/>
  <rect x="50" y="195" width="300" height="8" fill="#6d4c41"/>
  
  <!-- Sink -->
  <ellipse cx="120" cy="210" rx="25" ry="15" fill="#90a4ae" stroke="#607d8b" stroke-width="2"/>
  <rect x="115" y="205" width="10" height="15" fill="#607d8b"/>
  
  <!-- Faucet -->
  <rect x="118" y="190" width="4" height="15" rx="2" fill="#757575"/>
  <path d="M120 190 Q130 185 135 190" stroke="#757575" stroke-width="3" fill="none"/>
  
  <!-- Stove -->
  <rect x="200" y="190" width="60" height="40" rx="5" fill="#424242"/>
  <circle cx="215" cy="205" r="8" fill="#616161"/>
  <circle cx="245" cy="205" r="8" fill="#616161"/>
  <rect x="210" y="200" width="10" height="10" fill="#ff5722"/>
  <rect x="240" y="200" width="10" height="10" fill="#ff9800"/>
  
  <!-- Refrigerator -->
  <rect x="280" y="150" width="50" height="80" rx="5" fill="#eceff1" stroke="#b0bec5" stroke-width="2"/>
  <rect x="285" y="155" width="40" height="30" rx="3" fill="#cfd8dc"/>
  <rect x="285" y="190" width="40" height="30" rx="3" fill="#cfd8dc"/>
  
  <!-- Technician -->
  <circle cx="100" cy="140" r="10" fill="#ffcc80"/>
  <rect x="92" y="150" width="16" height="20" rx="3" fill="#2196f3"/>
  <rect x="88" y="148" width="8" height="12" rx="2" fill="#ff9800" transform="rotate(-30 92 154)"/>
  
  <!-- Tools on counter -->
  <rect x="150" y="210" width="12" height="3" rx="1" fill="#795548"/>
  <circle cx="156" cy="213" r="2" fill="#ff5722"/>
  
  <!-- Title -->
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2d5016">Plomberie Cuisine</text>
  <text x="200" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Neuilly-sur-Seine</text>
</svg>