<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- Bathroom scene -->
  <rect x="50" y="100" width="150" height="120" rx="10" fill="white" stroke="#ddd" stroke-width="2"/>
  
  <!-- Bathtub -->
  <rect x="70" y="160" width="110" height="40" rx="20" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <rect x="65" y="165" width="120" height="5" fill="#2196f3"/>
  
  <!-- Shower head -->
  <rect x="120" y="110" width="20" height="30" rx="5" fill="#757575"/>
  <circle cx="130" cy="105" r="8" fill="#757575"/>
  
  <!-- Water drops -->
  <circle cx="125" cy="140" r="2" fill="#2196f3" opacity="0.6"/>
  <circle cx="130" cy="145" r="2" fill="#2196f3" opacity="0.6"/>
  <circle cx="135" cy="140" r="2" fill="#2196f3" opacity="0.6"/>
  
  <!-- Technician -->
  <circle cx="280" cy="130" r="15" fill="#ffcc80"/>
  <rect x="270" y="145" width="20" height="30" rx="5" fill="#757575"/>
  
  <!-- Tools -->
  <rect x="260" y="175" width="15" height="3" rx="1" fill="#757575" transform="rotate(-30 267 176)"/>
  <circle cx="265" cy="178" r="4" fill="#ffc107"/>
  
  <!-- Floor -->
  <rect x="0" y="220" width="400" height="80" fill="#8d6e63"/>
  
  <!-- Title -->
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2d5016">Installation Salle de Bain</text>
  <text x="200" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Paris 15e Arrondissement</text>
</svg>