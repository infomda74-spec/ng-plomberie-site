<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- Room walls -->
  <rect x="50" y="50" width="300" height="200" fill="#ffffff" stroke="#ddd" stroke-width="2"/>
  
  <!-- Radiator -->
  <rect x="80" y="80" width="120" height="60" fill="#c0392b" rx="5"/>
  <rect x="85" y="85" width="110" height="50" fill="#e74c3c" rx="3"/>
  <line x1="95" y1="95" x2="95" y2="125" stroke="#fff" stroke-width="2"/>
  <line x1="110" y1="95" x2="110" y2="125" stroke="#fff" stroke-width="2"/>
  <line x1="125" y1="95" x2="125" y2="125" stroke="#fff" stroke-width="2"/>
  <line x1="140" y1="95" x2="140" y2="125" stroke="#fff" stroke-width="2"/>
  <line x1="155" y1="95" x2="155" y2="125" stroke="#fff" stroke-width="2"/>
  <line x1="170" y1="95" x2="170" y2="125" stroke="#fff" stroke-width="2"/>
  <line x1="185" y1="95" x2="185" y2="125" stroke="#fff" stroke-width="2"/>
  
  <!-- Pipes -->
  <rect x="200" y="85" width="150" height="8" fill="#7f8c8d"/>
  <rect x="200" y="127" width="150" height="8" fill="#7f8c8d"/>
  
  <!-- Thermostat -->
  <circle cx="100" cy="70" r="15" fill="#34495e"/>
  <text x="100" y="75" text-anchor="middle" fill="white" font-family="Arial" font-size="12">22°</text>
  
  <!-- Heat waves -->
  <path d="M 90 160 Q 95 170, 90 180" stroke="#e74c3c" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 100 165 Q 105 175, 100 185" stroke="#e74c3c" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 110 160 Q 115 170, 110 180" stroke="#e74c3c" stroke-width="2" fill="none" opacity="0.7"/>
  
  <!-- Professional tools -->
  <rect x="250" y="120" width="30" height="5" fill="#34495e" transform="rotate(45 265 122)"/>
  <rect x="270" y="140" width="25" height="4" fill="#34495e" transform="rotate(-30 282 142)"/>
  
  <!-- NG Plomberie branding -->
  <rect x="150" y="220" width="100" height="25" fill="#2d5016" rx="3"/>
  <text x="200" y="237" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">NG PL</text>
</svg>