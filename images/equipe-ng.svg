  <rect x="130" y="145" width="40" height="60" fill="#2c3e50" rx="5"/>
  <rect x="135" y="150" width="30" height="8" fill="#34495e"/>
  <rect x="135" y="162" width="30" height="8" fill="#34495e"/>
  <rect x="140" y="175" width="20" height="8" fill="#34495e"/>
