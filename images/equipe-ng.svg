  <!-- Expert 1 -->
  <circle cx="280" cy="120" r="25" fill="#e74c3c"/>
  <rect x="260" y="145" width="40" height="60" fill="#8e44ad" rx="5"/>
  <rect x="265" y="150" width="30" height="8" fill="#9b59b6"/>
  <rect x="265" y="162" width="30" height="8" fill="#9b59b6"/>
  <rect x="270" y="175" width="20" height="8" fill="#9b59b6"/>
  <rect x="255" y="210" width="50" height="40" fill="#27ae60" rx="3"/>
  <text x="280" y="235" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">CHAUDAGISTE</text>
  
  <!-- Expert 2 -->
  <circle cx="410" cy="120" r="25" fill="#f39c12"/>
  <rect x="390" y="145" width="40" height="60" fill="#d35400" rx="5"/>
  <rect x="395" y="150" width="30" height="8" fill="#e67e22"/>
  <rect x="395" y="162" width="30" height="8" fill="#e67e22"/>
  <rect x="400" y="175" width="20" height="8" fill="#e67e22"/>
  <rect x="385" y="210" width="50" height="40" fill="#16a085" rx="3"/>
  <text x="410" y="235" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">SPECIALISTE</text>
  
  <!-- Team members below -->
  <!-- Technician 1 -->
  <circle cx="100" cy="300" r="20" fill="#95a5a6"/>
  <rect x="85" y="320" width="30" height="45" fill="#34495e" rx="3"/>
  
  <!-- Technician 2 -->
  <circle cx="200" cy="300" r="20" fill="#95a5a6"/>
  <rect x="185" y="320" width="30" height="45" fill="#34495e" rx="3"/>
  
  <!-- Technician 3 -->
  <circle cx="300" cy="300" r="20" fill="#95a5a6"/>
  <rect x="285" y="320" width="30" height="45" fill="#34495e" rx="3"/>
  
  <!-- Technician 4 -->
  <circle cx="400" cy="300" r="20" fill="#95a5a6"/>
  <rect x="385" y="320" width="30" height="45" fill="#34495e" rx="3"/>
  
  <!-- Tools around team -->
  <rect x="50" y="250" width="25" height="3" fill="#e74c3c" transform="rotate(45 62 251)"/>
  <rect x="420" y="260" width="20" height="3" fill="#3498db" transform="rotate(-30 430 261)"/>
  <rect x="150" y="370" width="22" height="3" fill="#f39c12" transform="rotate(60 161 371)"/>
  <rect x="320" y="375" width="18" height="3" fill="#27ae60" transform="rotate(-45 329 376)"/>
  
  <!-- Company logo -->
  <rect x="200" y="30" width="100" height="30" fill="#2d5016" rx="5"/>
  <text x="250" y="50" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">NG PL</text>
  <text x="250" y="20" text-anchor="middle" fill="#2d5016" font-family="Arial" font-size="10" font-weight="bold">Équipe Expert</text>
  
  <!-- Certifications -->
  <rect x="50" y="60" width="40" height="15" fill="#f39c12" rx="3"/>
  <text x="70" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="7">RGE</text>
  
  <rect x="100" y="60" width="40" height="15" fill="#27ae60" rx="3"/>
  <text x="120" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="7">QUALIBAT</text>
  
  <!-- Stats -->
  <text x="250" y="380" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="12" font-weight="bold">10+ ans d'expérience • 11 experts • 4.8/5 client satisfaction</text>
