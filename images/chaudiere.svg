<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- Boiler room scene -->
  <rect x="50" y="50" width="300" height="200" rx="10" fill="#eceff1" stroke="#cfd8dc" stroke-width="2"/>
  
  <!-- Boiler -->
  <rect x="80" y="120" width="100" height="80" rx="10" fill="#607d8b" stroke="#455a64" stroke-width="2"/>
  <rect x="90" y="130" width="80" height="60" rx="5" fill="#90a4ae"/>
  
  <!-- Pipes -->
  <rect x="180" y="140" width="40" height="8" fill="#78909c"/>
  <rect x="180" y="152" width="40" height="8" fill="#78909c"/>
  <rect x="220" y="140" width="60" height="6" fill="#78909c"/>
  <rect x="220" y="148" width="60" height="6" fill="#78909c"/>
  
  <!-- Technician working -->
  <circle cx="320" cy="100" r="12" fill="#ffcc80"/>
  <rect x="310" y="112" width="20" height="25" rx="5" fill="#4caf50"/>
  <rect x="305" y="110" width="12" height="20" rx="3" fill="#ff9800" transform="rotate(-45 311 120)"/>
  
  <!-- Tools -->
  <rect x="290" y="150" width="15" height="3" rx="1" fill="#795548" transform="rotate(30 297 151)"/>
  <circle cx="295" cy="155" r="3" fill="#ff5722"/>
  
  <!-- Control panel -->
  <rect x="250" y="180" width="80" height="40" rx="5" fill="#37474f"/>
  <circle cx="265" cy="195" r="3" fill="#4caf50"/>
  <circle cx="280" cy="195" r="3" fill="#ff9800"/>
  <circle cx="295" cy="195" r="3" fill="#f44336"/>
  <rect x="260" y="205" width="60" height="3" fill="#64b5f6"/>
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2d5016">Installation Chaudière</text>
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Boulogne-Billancourt</text>
</svg>